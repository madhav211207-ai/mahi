<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MAHI ❤️ SHAMBHAVI</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9ecf,#ff4da6);
color:white;
text-align:center;
overflow:hidden;
}

/* intro screen */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
background:#000000cc;
z-index:10;
}

/* floating hearts */

.heart{
position:fixed;
font-size:20px;
color:pink;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* falling roses */

.rose{
position:fixed;
font-size:24px;
top:-40px;
animation:fall 10s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* page */

.page{
display:none;
padding:40px;
}

.active{
display:block;
}

/* glass card */

.card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
border-radius:20px;
padding:30px;
max-width:600px;
margin:auto;
}

/* neon title */

h1{
font-size:45px;
text-shadow:0 0 10px white,0 0 20px pink,0 0 40px red;
}

/* buttons */

button{
padding:14px 25px;
border:none;
border-radius:10px;
font-size:18px;
margin:10px;
cursor:pointer;
background:white;
color:#ff007f;
}

/* poetry */

#poetry{
white-space:pre-line;
font-size:18px;
line-height:1.7;
}

</style>
</head>

<body>

<div id="intro">Shambhavi is typing...</div>

<div class="page active" id="page1">
<div class="card">

<h1>MAHI ❤️ SHAMBHAVI</h1>

<p>What looks better?</p>

<button onclick="eyes()">Your eyes with kajal 👀</button>

<button id="lipBtn" onclick="shrink()">Lip gloss on your lips 💄</button>

<br><br>

<button onclick="startMusic()">🎵 Start Music</button>

</div>
</div>

<div class="page" id="page2">
<div class="card">

<h2>For You 🌹</h2>

<p id="poetry"></p>

</div>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_3d2bfb8e6c.mp3">
</audio>

<script>

/* intro */

setTimeout(()=>{
document.getElementById("intro").style.display="none";
},2500);

/* floating hearts */

for(let i=0;i<20;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💗";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=5+Math.random()*5+"s";
document.body.appendChild(h);
}

/* roses */

for(let i=0;i<15;i++){
let r=document.createElement("div");
r.className="rose";
r.innerHTML="🌹";
r.style.left=Math.random()*100+"vw";
r.style.animationDuration=6+Math.random()*6+"s";
document.body.appendChild(r);
}

/* shrinking button */

let size=18;

function shrink(){
size-=2;
document.getElementById("lipBtn").style.fontSize=size+"px";
}

/* heart explosion */

function explode(){
for(let i=0;i<15;i++){
let e=document.createElement("div");
e.innerHTML="💖";
e.style.position="fixed";
e.style.left="50%";
e.style.top="50%";
e.style.fontSize="24px";
e.style.transform=`translate(${Math.random()*200-100}px,${Math.random()*200-100}px)`;
document.body.appendChild(e);
setTimeout(()=>e.remove(),1000);
}
}

/* eyes click */

function eyes(){

explode();

setTimeout(()=>{
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");
typePoetry();
},700);

}

/* typing poetry */

let text=`Talash karogi tao koi aur mil jayega,
Par mujhe sa chahega kaun?
Chahaton se dekhega zarur zamana tumhe,
Par wo aankhein mujhe sa layega kaise...

Jo khamoshi samajh le bina kahe,
Jo har dard pe pehle tera naam bulaye,
Jo tumhari har jeet ko apni dua banaye
Aur har mushkil se tumhe bachaye.

Zamana mohabbat ka daam lagayega,
Par meri tarah khud ko kaun lutayega?
Mil jayenge chehre hazaar tumhe,
Par meri rooh sa ishq kaun nibhayega?

Talash karogi tao mil jayegaaa koiii`;

let i=0;

function typePoetry(){

let p=document.getElementById("poetry");

let interval=setInterval(()=>{
p.textContent+=text[i];
i++;
if(i>=text.length) clearInterval(interval);
},35);

}

/* music */

function startMusic(){
document.getElementById("music").play();
}

</script>

</body>
</html>
