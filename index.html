<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Mahi ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
text-align:center;
color:white;
background:linear-gradient(-45deg,#ff9ecf,#ff6fb5,#ffb6d9,#ffdff0);
background-size:400% 400%;
animation:bg 12s ease infinite;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.page{
display:none;
min-height:100vh;
padding:40px;
}

.active{
display:block;
}

/* glass card */

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
width:80%;
max-width:700px;
margin:auto;
margin-top:80px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

/* neon title */

.neon{
font-family:'Great Vibes',cursive;
font-size:65px;
text-shadow:
0 0 10px #ff4da6,
0 0 20px #ff4da6,
0 0 40px #ff1493;
}

/* buttons */

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4da6,#ff1493);
color:white;
cursor:pointer;
margin:10px;
transition:.4s;
}

button:hover{
transform:scale(1.15);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* falling roses */

.rose{
position:fixed;
top:-30px;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* floating hearts */

.heart{
position:absolute;
font-size:24px;
animation:rise 2s linear forwards;
}

@keyframes rise{
0%{opacity:1;}
100%{opacity:0; transform:translateY(-300px);}
}

/* typing intro */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
z-index:1000;
}

</style>
</head>

<body>

<div id="intro">Shambhavi is typing...</div>

<!-- PAGE 1 -->

<div class="page active" id="page1">

<div class="card">

<h1 class="neon">MAHI</h1>
<h2 class="neon">Shambhavi</h2>

<h3>What looks better?</h3>

<button id="eyesBtn" onclick="eyes()">Your eyes with kajal</button>
<button onclick="grow()">Lip gloss on your lips</button>

<p id="secret"></p>

</div>

</div>


<!-- PAGE 2 -->

<div class="page" id="page2">

<div class="card">

<p id="poem"></p>

<button onclick="go(3)">Next</button>

</div>

</div>


<!-- PAGE 3 -->

<div class="page" id="page3">

<div class="card">

<h3>You're ugly if you pick the wrong flower 😭</h3>

<button onclick="flower()">🥀</button>
<button onclick="flower()">🌹</button>
<button onclick="flower()">🌷</button>

<p id="flowerText"></p>

<button onclick="agree()">I AGREE</button>

<p id="agreeText"></p>

<button onclick="go(4)">Next</button>

</div>

</div>


<!-- PAGE 4 -->

<div class="page" id="page4">

<div class="card">

<h3>Click next to know why I am best for you</h3>

<button onclick="go(5)">Next</button>
<button onclick="end()">Not Interested</button>

</div>

</div>


<!-- PAGE 5 -->

<div class="page" id="page5">

<div class="card">

<h1>😏😏😏</h1>
<h2>because meh ladka hu 😭</h2>
<h3>(JUST KIDDING)</h3>

</div>

</div>


<script>

/* intro screen */

setTimeout(()=>{
document.getElementById("intro").style.display="none"
},2500)

/* page change */

function go(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"))
document.getElementById("page"+p).classList.add("active")
}

/* grow button */

let size=20
function grow(){
size+=10
document.getElementById("eyesBtn").style.fontSize=size+"px"
}

/* eyes clicked */

function eyes(){

document.getElementById("secret").innerHTML=
"I knew you would pick the most beautiful thing in the world… YOU 💖"

hearts()

setTimeout(()=>{
go(2)
typePoem()
},2000)

}

/* hearts explosion */

function hearts(){

for(let i=0;i<30;i++){

let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"
h.style.left=Math.random()*100+"vw"
h.style.top="60%"
document.body.appendChild(h)

setTimeout(()=>h.remove(),2000)

}

}

/* poem typing */

const text=`Talash karogi tao koi aur mil jayega, Par mujhe sa chahega kaun? Chahaton se dekhega zarur zamana tumhe, Par wo aankhein mujhe sa layega kaise...

Jo khamoshi samajh le bina kahe, Jo har dard pe pehle tera naam bulaye, Jo tumhari har jeet ko apni dua banaye Aur har mushkil se tumhe bachaye.

Zamana mohabbat ka daam lagayega, Par meri tarah khud ko kaun lutayega? Mil jayenge chehre hazaar tumhe, Par meri rooh sa ishq kaun nibhayega?

Talash karogi tao mil jayegaaa koiii

let i=0

function typePoem(){

let area=document.getElementById("poem")

function type(){

if(i<text.length){
area.innerHTML+=text.charAt(i)
i++
setTimeout(type,40)
}

}

type()

}

/* flower */

function flower(){
document.getElementById("flowerText").innerText=
"I know you are pretty ❤️ aur tumhari aankhein kaafi hai unmein dubne ke liye."
}

/* agree */

function agree(){
document.getElementById("agreeText").innerText=
"Mene koi galat option rakha hi nahi tha... kyunki tum ugly ho hi nahi sakti."
}

/* end */

function end(){
document.body.innerHTML="<h1>Maybe next time 😅</h1>"
}

/* falling roses */

function rose(){

let r=document.createElement("div")
r.className="rose"
r.innerHTML="🌹"
r.style.left=Math.random()*100+"vw"
r.style.animationDuration=(Math.random()*3+5)+"s"

document.body.appendChild(r)

setTimeout(()=>r.remove(),8000)

}

setInterval(rose,400)

</script>

</body>
</html>
